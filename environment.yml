name: tlc_calib
channels:
  - nvidia
  - pytorch
  - pyg
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - numpy=1.26.4
  - pip>=24.2
  - setuptools
  - wheel
  - pytorch=2.1.2
  - torchvision=0.16.2
  - pytorch-cuda=11.8
  - pytorch-scatter
  - plyfile=0.8.1
  - tqdm
  - yaml
  - matplotlib
  - opencv

  - pip:
    - einops
    - wandb
    - lpips
    - laspy
    - jaxtyping
    - torchviz
    - open3d
    - viser==1.0.15
    - nerfview==0.0.3
    - submodules/diff-gaussian-rasterization-w-pose
    - submodules/simple-knn
    - nvs_eval/submodules/diff-gaussian-rasterization